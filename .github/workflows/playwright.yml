name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      grep:
        description: 'Tag to run, for example @smoke'
        required: false
        default: '@smoke'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Set grep value
        run: echo "GREP=${{ github.event.inputs.grep || '@smoke' }}" >> $GITHUB_ENV

      - name: Run Playwright tests
        run: npx playwright test --grep "$GREP"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
         name: test-results
         path: test-results/
         retention-days: 30